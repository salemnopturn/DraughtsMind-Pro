name: Release

on:
  push:
    tags: [ 'v*' ]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
      - uses: softprops/action-gh-release@v1
        with:
          files: |
            build/dist/*.AppImage
            build/dist/*.deb
            build/dist/*.rpm
            build/dist/*.exe
            build/dist/*.dmg
          draft: false
          prerelease: false
